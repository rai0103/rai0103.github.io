<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>政治家マップ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#07090f;color:#dce4f0;font-family:sans-serif;}
body{display:flex;flex-direction:column;}
#hdr{flex:0 0 50px;background:#0e1118;border-bottom:1px solid #1e2535;display:flex;align-items:center;justify-content:space-between;padding:0 14px;}
.logo{font-size:20px;font-weight:900;color:#fff;cursor:pointer;user-select:none;}
.logo span{color:#c9a84c;}
#dt{font-size:10px;color:#5a6a88;}
#dt b{color:#3dd68c;}
#sa{flex:0 0 auto;padding:10px 12px 0;position:relative;z-index:15;}
#sb{display:flex;align-items:center;background:#0e1118;border:1px solid #2c3550;}
#sb:focus-within{border-color:#c9a84c;}
#sb em{padding:0 8px;color:#5a6a88;font-style:normal;}
#si{flex:1;background:none;border:none;outline:none;color:#dce4f0;font-size:14px;padding:10px 0;}
#si::placeholder{color:#5a6a88;}
#sc{display:none;padding:0 10px;background:none;border:none;color:#5a6a88;font-size:16px;cursor:pointer;}
#dd{display:none;position:absolute;top:calc(100% + 2px);left:12px;right:12px;background:#141820;border:1px solid #2c3550;box-shadow:0 12px 40px rgba(0,0,0,.8);max-height:200px;overflow-y:auto;z-index:100;}
#dd.open{display:block;}
.ddi{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;border-bottom:1px solid #1e2535;font-size:13px;font-weight:700;}
.ddi:hover,.ddi.hi{background:rgba(201,168,76,.08);}
.ddm{font-size:10px;text-align:right;line-height:1.5;}
#fa{flex:0 0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:8px 12px 0;}
.fl{font-size:10px;color:#5a6a88;}
.fb{padding:4px 10px;font-size:11px;background:none;border:1px solid #2c3550;color:#5a6a88;cursor:pointer;border-radius:2px;white-space:nowrap;transition:all .15s;}
.fb:hover{border-color:#dce4f0;color:#dce4f0;}
.fb.on{background:rgba(201,168,76,.12);border-color:#c9a84c;color:#c9a84c;}

/* THE KEY: canvas wrapper fills remaining flex space.
   Canvas is inside it with explicit px size set by JS.
   No position:absolute — canvas is a normal block element. */
#ma{flex:1 1 0;min-height:0;overflow:hidden;margin:8px 12px 0;}
#cv{display:block;cursor:pointer;}

#st{flex:0 0 auto;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;padding:5px 12px;border-top:1px solid #1e2535;font-size:10px;color:#5a6a88;gap:4px;}
#sl{display:flex;flex-wrap:wrap;gap:4px 10px;}
.sci{display:flex;align-items:center;gap:4px;}
.scd{width:7px;height:7px;border-radius:50%;}

/* popup - centered modal on mobile */
#pop{display:none;position:fixed;inset:0;z-index:600;align-items:center;justify-content:center;padding:20px;}
#pop.on{display:flex;}
#pop-bg{position:absolute;inset:0;background:rgba(0,0,0,.5);}
.pc{position:relative;z-index:1;width:100%;max-width:320px;background:#141820;border:1px solid #2c3550;box-shadow:0 20px 60px rgba(0,0,0,.9);}
.pb{height:3px;}
.pbd{display:flex;gap:12px;padding:14px;}
.pp{width:66px;height:66px;flex-shrink:0;background:#0e1118;border:1px solid #2c3550;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;}
.pp img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
.pi{flex:1;min-width:0;}
.pn{font-size:19px;font-weight:900;color:#fff;margin-bottom:2px;}
.pen{font-size:9px;color:#5a6a88;margin-bottom:6px;letter-spacing:.08em;}
.pbg{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;margin-bottom:5px;}
.pdt{font-size:10px;color:#5a6a88;line-height:1.6;}
.pco{display:flex;gap:10px;padding:10px 14px;background:rgba(0,0,0,.3);border-top:1px solid #1e2535;}
.pcol{flex:1;text-align:center;}
.pclb{font-size:9px;color:#5a6a88;margin-bottom:2px;}
.pcv{font-family:monospace;font-size:15px;font-weight:700;}
.pak{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;background:none;border:none;border-top:1px solid #1e2535;width:100%;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.06em;}
.pak:hover{background:rgba(255,255,255,.04);}
.pxb{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:#888;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* butterfly */
#bf{position:fixed;inset:0;background:#07090f;z-index:400;overflow-y:auto;display:none;}
#bf.on{display:block;}
.bfc{max-width:700px;margin:0 auto;padding:20px 16px 60px;}
.bk{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid #2c3550;color:#5a6a88;font-size:11px;padding:6px 14px;cursor:pointer;margin-bottom:18px;}
.bk:hover{border-color:#c9a84c;color:#c9a84c;}
.bh{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-bottom:14px;border-bottom:1px solid #1e2535;margin-bottom:20px;}
.bn{font-size:28px;font-weight:900;color:#fff;line-height:1;}
.bba{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;margin:6px 0;}
.bm{font-size:11px;color:#5a6a88;line-height:1.7;}
.bm b{font-family:monospace;color:#e8354a;}
.btit{font-size:10px;letter-spacing:.2em;color:#5a6a88;margin-bottom:12px;}
.br{display:grid;grid-template-columns:100px 1fr 34px 1fr 30px;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);opacity:0;transition:opacity .5s,transform .5s;transform:translateX(-10px);}
@media(max-width:480px){.br{grid-template-columns:76px 1fr 30px 1fr 24px;}}
.br.vis{opacity:1;transform:translateX(0);}
.rl{font-size:11px;font-weight:700;text-align:right;padding-right:10px;line-height:1.3;color:#dce4f0;}
.tl2{display:flex;align-items:center;justify-content:flex-end;}
.bl2{height:5px;border-radius:1px;width:0;transition:width 1.2s cubic-bezier(.16,1,.3,1);}
.sn{font-family:monospace;font-size:20px;line-height:1;text-align:center;}
.tr2{display:flex;align-items:center;}
.brr{height:5px;border-radius:1px;width:0;transition:width 1.2s cubic-bezier(.16,1,.3,1);}
.mx{font-size:9px;color:#5a6a88;padding-left:4px;}
.es{margin-top:24px;border-top:1px solid #1e2535;padding-top:14px;}
.et{background:none;border:1px solid #2c3550;color:#5a6a88;font-size:11px;padding:6px 14px;cursor:pointer;}
.et:hover{border-color:#c9a84c;color:#c9a84c;}
.eb{display:none;margin-top:14px;}
.eb.open{display:block;}
.ei{display:grid;grid-template-columns:76px 1fr;gap:8px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.ec{font-size:10px;font-weight:700;}
.eq{font-size:11px;line-height:1.7;}
.er{margin-top:3px;font-size:9px;color:#5a6a88;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#2c3550;border-radius:2px;}
</style>
</head>

let fP='all', hlId=null, popId=null, ddL=[], ddI=-1, hits=[];

/* ════ CANVAS DRAW ════
   CRITICAL: DPR=1 always. Do NOT use window.devicePixelRatio.
   Android Chrome dpr=2.625 causes canvas corruption with setTransform.
   We use CSS pixels = canvas pixels directly (1:1).
   The browser upscales via CSS naturally.
*/
function draw(){
  const ma=document.getElementById('ma');
  const W=ma.clientWidth;
  const H=ma.clientHeight;
  if(!W||!H){ requestAnimationFrame(draw); return; }

  const cv=document.getElementById('cv');
  // 1:1 mapping — no DPR scaling at all
  cv.width =W;
  cv.height=H;
  cv.style.width =W+'px';
  cv.style.height=H+'px';

  const ctx=cv.getContext('2d');
  // no ctx.scale() — 1:1

  const SC=Math.min(W,H)/2/10*0.84;
  const tx=v=>W/2+v*SC;
  const ty=v=>H/2-v*SC;

  // background
  ctx.fillStyle='#07090f';
  ctx.fillRect(0,0,W,H);

  // quadrant tints
  ctx.fillStyle='rgba(232,53,74,.05)';  ctx.fillRect(W/2,0,W/2,H/2);
  ctx.fillStyle='rgba(201,168,76,.02)'; ctx.fillRect(0,0,W/2,H/2);
  ctx.fillStyle='rgba(74,127,232,.05)'; ctx.fillRect(0,H/2,W/2,H/2);
  ctx.fillStyle='rgba(80,80,120,.02)';  ctx.fillRect(W/2,H/2,W/2,H/2);

  // grid
  ctx.strokeStyle='#1e2535'; ctx.lineWidth=0.5;
  for(let v=-8;v<=8;v+=2){
    if(!v) continue;
    ctx.beginPath(); ctx.moveTo(tx(v),0);  ctx.lineTo(tx(v),H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,ty(v));  ctx.lineTo(W,ty(v)); ctx.stroke();
  }

  // axes
  ctx.strokeStyle='#3a4560'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();

  // labels
  const fs=W<420?11:13;
  ctx.font='bold '+fs+'px sans-serif';
  ctx.fillStyle='#e8354a'; ctx.textAlign='center'; ctx.textBaseline='top';    ctx.fillText('保守',W/2,4);
  ctx.fillStyle='#4a7fe8'; ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText('リベラル',W/2,H-2);
  ctx.fillStyle='#e8354a'; ctx.textAlign='right';  ctx.textBaseline='middle'; ctx.fillText('タカ派',W-4,H/2-fs-4);
  ctx.fillStyle='#4a7fe8'; ctx.textAlign='left';   ctx.textBaseline='middle'; ctx.fillText('ハト派',4,H/2-fs-4);
  // quadrant labels - white with dark outline
  const qlfs = W<420?10:12;
  ctx.font = 'bold '+qlfs+'px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const qlabels = [
    {t:'保守×タカ派',  x:W*.75, y:H*.07},
    {t:'保守×ハト派',  x:W*.25, y:H*.07},
    {t:'リベラル×ハト派', x:W*.22, y:H*.93},
    {t:'リベラル×タカ派', x:W*.75, y:H*.93},
  ];
  qlabels.forEach(({t,x,y})=>{
    ctx.fillStyle='rgba(0,0,0,0.7)';
    for(let dx=-2;dx<=2;dx++) for(let dy=-2;dy<=2;dy++){
      if(dx||dy) ctx.fillText(t, x+dx, y+dy);
    }
    ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.fillText(t, x, y);
  });

  // dots
  hits=[];
  const show=fP==='all'?DATA:DATA.filter(p=>p.party===fP);
  show.filter(p=>p.id!==hlId).forEach(p=>dot(ctx,p,false,tx,ty,W,H));
  if(hlId){ const hp=DATA.find(p=>p.id===hlId); if(hp&&(fP==='all'||hp.party===fP)) dot(ctx,hp,true,tx,ty,W,H); }

  // status
  const cnt={}; show.forEach(p=>cnt[p.party]=(cnt[p.party]||0)+1);
  document.getElementById('sl').innerHTML=Object.entries(cnt).map(([p,n])=>
    `<div class="sci"><div class="scd" style="background:${pc(p)}"></div><span style="color:${pc(p)};font-weight:700">${p} ${n}名</span></div>`).join('');
}

function dot(ctx,p,hl,tx,ty,W,H){
  const col=pc(p.party);
  const px=tx(p.x), py=ty(p.y);
  const r=hl?9:(W<420?5:6);
  const alpha=hl?1:(hlId?0.3:0.85);

  hits.push({p,cx:px,cy:py,r:r+8});

  // glow
  if(hl){
    const g=ctx.createRadialGradient(px,py,0,px,py,r*4);
    g.addColorStop(0,col+'55'); g.addColorStop(1,col+'00');
    ctx.beginPath(); ctx.arc(px,py,r*4,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    ctx.save(); ctx.strokeStyle=col+'44'; ctx.lineWidth=0.8; ctx.setLineDash([4,6]);
    ctx.beginPath(); ctx.moveTo(px,2); ctx.lineTo(px,H-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2,py); ctx.lineTo(W-2,py); ctx.stroke();
    ctx.restore();
  }

  // circle
  ctx.globalAlpha=alpha;
  ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
  ctx.fillStyle=hl?col:(hlId?'#3a4a5a':col); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=hl?2:1; ctx.stroke();
  ctx.globalAlpha=1;

  // label
  const lfs=hl?11:8;
  ctx.font=(hl?'bold ':'')+lfs+'px sans-serif';
  const tw=ctx.measureText(p.name).width;
  const lx=p.x>4?px-r-3-tw:px+r+3;
  ctx.globalAlpha=hl?1:(hlId?0.3:0.9);
  ctx.fillStyle='rgba(7,9,15,.88)';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  for(let a=-2;a<=2;a++) for(let b=-2;b<=2;b++){if(a||b) ctx.fillText(p.name,lx+a,py+b);}
  ctx.fillStyle=hl?'#fff':(hlId?'#777':'#ddd'); ctx.fillText(p.name,lx,py);
  ctx.globalAlpha=1;
}

/* ════ CANVAS CLICK ════ */
document.getElementById('cv').addEventListener('click',e=>{
  const r=e.currentTarget.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  for(let i=hits.length-1;i>=0;i--){
    const{p,cx,cy,r:hr}=hits[i];
    if((mx-cx)**2+(my-cy)**2<=hr*hr){ hlId=p.id; draw(); openPop(p,e); return; }
  }
  clrP();
});

/* ════ POPUP ════ */
function openPop(p,e){
  popId=p.id; const col=pc(p.party);
  document.getElementById('pb').style.background=`linear-gradient(90deg,${col},transparent)`;
  const pp=document.getElementById('pp');
  pp.style.cssText=`background:${col}18;color:${col}`;
  pp.textContent=p.name[0];
  if(PH[p.id]){
    const img=new Image(); img.alt=p.name;
    img.onload=()=>{pp.style.cssText='';pp.style.background='';pp.innerHTML='';pp.appendChild(img);};
    img.src=PH[p.id];
  }
  document.getElementById('pn').textContent=p.name;
  document.getElementById('pe').textContent=p.en;
  const pg=document.getElementById('pg'); pg.textContent=p.party; pg.style.cssText=`background:${col}22;border:1px solid ${col}55;color:${col}`;
  document.getElementById('pd').textContent=p.house+'　'+p.area;
  const fv=v=>(v>0?'+':'')+v;
  const ex=document.getElementById('px2'); ex.textContent=fv(p.x); ex.style.color=col;
  const ey=document.getElementById('py2'); ey.textContent=fv(p.y); ey.style.color=col;
  const pa=document.getElementById('pa'); pa.style.color=col; pa.onclick=()=>{clrP();openBF(p.id);};
  document.getElementById('pop').classList.add('on');
}
function clrP(){
  document.getElementById('pop').classList.remove('on'); popId=null;
  if(hlId){hlId=null;draw();}
}

/* ════ SEARCH ════ */
function onI(v){
  document.getElementById('sc').style.display=v?'block':'none';
  if(!v.trim()){closeDd();return;}
  ddL=DATA.filter(p=>p.name.includes(v)||p.en.toLowerCase().includes(v.toLowerCase())||p.party.includes(v));
  ddI=-1; renderDd(v.trim());
}
function renderDd(q){
  const dd=document.getElementById('dd');
  dd.innerHTML=ddL.length
    ? ddL.slice(0,8).map(p=>`<div class="ddi" onclick="pickD('${p.id}')"><span>${p.name.replace(q,'<em style="color:#c9a84c;font-style:normal">'+q+'</em>')}</span><span class="ddm" style="color:${pc(p.party)}">${p.party}<br>${p.house}</span></div>`).join('')
    : '<div style="padding:12px;font-size:12px;color:#5a6a88;text-align:center">見つかりません</div>';
  dd.classList.add('open');
}
function onK(e){
  const its=[...document.querySelectorAll('.ddi')];
  if(e.key==='ArrowDown'){ddI=Math.min(ddI+1,its.length-1);its.forEach((x,i)=>x.classList.toggle('hi',i===ddI));e.preventDefault();}
  else if(e.key==='ArrowUp'){ddI=Math.max(ddI-1,0);its.forEach((x,i)=>x.classList.toggle('hi',i===ddI));e.preventDefault();}
  else if(e.key==='Enter'){if(ddI>=0&&ddL[ddI])pickD(ddL[ddI].id);else if(ddL.length===1)pickD(ddL[0].id);e.preventDefault();}
  else if(e.key==='Escape')closeDd();
}
function pickD(id){
  const p=DATA.find(x=>x.id===id); if(!p) return;
  hlId=id; document.getElementById('si').value=p.name; document.getElementById('sc').style.display='block'; closeDd();
  if(fP!=='all'&&p.party!==fP){fP='all';document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('on',b.dataset.p==='all'));}
  draw(); openPop(p,null);
}
function clrS(){document.getElementById('si').value='';document.getElementById('sc').style.display='none';closeDd();hlId=null;clrP();draw();}
function closeDd(){document.getElementById('dd').classList.remove('open');}
document.addEventListener('click',e=>{if(!e.target.closest('#sa'))closeDd();});

/* ════ FILTER ════ */
function setF(party,btn){
  fP=party; document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('on',b.dataset.p===party));
  if(hlId&&party!=='all'){const p=DATA.find(x=>x.id===hlId);if(p&&p.party!==party){hlId=null;clrP();}}
  draw();
}

/* ════ BUTTERFLY ════ */
function openBF(id){
  const p=DATA.find(x=>x.id===id); if(!p) return;
  const col=pc(p.party);
  const rows=CATS.map(cat=>{const sc=p.s[cat.key];if(sc==null)return'';
    const lw = sc<=5 ? ((5-sc)/4)*100 : 0;
    const rw = sc>=5 ? ((sc-5)/5)*100 : 0;
    return`<div class="br"><div class="rl">${cat.label}</div><div class="tl2"><div class="bl2" data-w="${lw}" style="background:linear-gradient(270deg,${col},${col}99)"></div></div><div class="sn" style="color:${col}">${sc}</div><div class="tr2"><div class="brr" data-w="${rw}" style="background:linear-gradient(90deg,${col},${col}99)"></div></div><div class="mx">/10</div></div>`;}).join('');
  const evs=p.ev.map(ev=>`<div class="ei"><div class="ec" style="color:${col}">${ev.c}</div><div><div class="eq">「${ev.q}」</div><div class="er">📌 ${ev.src}（${ev.d}）</div></div></div>`).join('');
  const xv=(p.x>0?'+':'')+p.x, yv=(p.y>0?'+':'')+p.y;
  document.getElementById('bfc').innerHTML=`
    <button class="bk" onclick="goHome()">← マップに戻る</button>
    <div class="bh"><div><div class="bn">${p.name}</div><div style="font-size:9px;color:#5a6a88;letter-spacing:.1em">${p.en}</div></div>
    <div style="text-align:right"><div class="bba" style="background:${col}22;border:1px solid ${col}55;color:${col}">${p.party}</div>
    <div class="bm">${p.house} ／ ${p.area}<br>経済・安保 <b>${xv}</b> ／ 社会・文化 <b>${yv}</b></div></div></div>
    <div class="btit">BUTTERFLY CHART — 政策スタンス指数</div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#5a6a88;margin-bottom:6px"><span>◀ リベラル側</span><span>保守・タカ派側 ▶</span></div>
    <div style="height:1px;background:#1e2535;margin:8px 0 14px"></div>
    ${rows}
    <div class="es"><button class="et" onclick="togEv(this)">▶ エビデンスを表示</button>
    <div class="eb" id="evb">${evs}<p style="margin-top:10px;font-size:9px;color:#5a6a88">⚠️ スコアは公開発言に基づく推定値。1＝リベラル・ハト派 / 10＝保守・タカ派</p></div></div>`;
  document.getElementById('bf').classList.add('on');
  document.getElementById('bf').scrollTop=0;
  requestAnimationFrame(()=>setTimeout(()=>{
    document.querySelectorAll('.br').forEach((row,i)=>setTimeout(()=>{
      row.classList.add('vis');
      const br=row.querySelector('.brr'),bl=row.querySelector('.bl2');
      if(br)br.style.width=br.dataset.w+'%'; if(bl)bl.style.width=bl.dataset.w+'%';
    },i*100));
  },60));
}
function togEv(btn){const b=document.getElementById('evb');b.classList.toggle('open');btn.textContent=b.classList.contains('open')?'▼ エビデンスを閉じる':'▶ エビデンスを表示';}
function goHome(){document.getElementById('bf').classList.remove('on'); requestAnimationFrame(draw);}

/* ════ INIT ════ */
const n=new Date();
document.getElementById('dt').innerHTML='更新 <b>'+n.getFullYear()+'年'+String(n.getMonth()+1).padStart(2,'0')+'月</b>';
// Triple rAF to ensure full layout before drawing
requestAnimationFrame(()=>requestAnimationFrame(()=>requestAnimationFrame(draw)));
let resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(draw,300);});
</script>
