name: 政治家データ自動更新

on:
  issues:
    types: [opened, edited]

jobs:
  update:
    # AUTO_UPDATE（管理者）または PENDING_REVIEW（ユーザー）タグがあるIssueのみ処理
    if: |
      contains(github.event.issue.body, '<!-- AUTO_UPDATE -->') ||
      contains(github.event.issue.body, '<!-- PENDING_REVIEW -->')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: データ更新スクリプト実行
        env:
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          ISSUE_BODY:   ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_politician.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "$(echo '${{ github.event.issue.title }}' | head -c 72) (#${{ github.event.issue.number }})"
          git push
